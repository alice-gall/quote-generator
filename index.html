<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Quote Generator</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Quote Generator</h1>
      </header>
      <main>
        <div class="form-container">
          <form id="quote-generator-form">
            <input
              type="text"
              placeholder="Enter the topic of the quote"
              autofocus
              required
              class="topic-submit-input"
              id="user-topic-input"
            />
            <input type="submit" class="submit-button" />
          </form>
          <div class="suggestion">i.e: Art, people or life</div>
        </div>
        <div class="quote hidden" id="quote"></div>
      </main>
      <footer>
        This AI project was coded by
        <a href="https://github.com/alice-gall" target="_blank">Alice Gall</a>
        and is
        <a href="https://github.com/alice-gall/quote-generator" target="_blank"
          >open-sourced on GitHub</a
        >
        and is
        <a href="https://ai-quote-generat0r.netlify.app/" target="_blank"
          >hosted on Netlify</a
        >.
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
